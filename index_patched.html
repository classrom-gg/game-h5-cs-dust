<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>CS Dust</title>
	<link rel="stylesheet" href="main_style.css">
<script src="vendor/prevent-keys.js"></script>
<script>
(function () {
  if (!('serviceWorker' in navigator)) return;
  if (location.protocol === 'file:') return;
  var u = 'unity-offline-sw.js';
  navigator.serviceWorker.register(u, { scope: './' }).catch(function (e) { console.warn('[unity-offline-sw]', e); });
})();
</script>

<script>
// Chunk loader for large files
async function loadChunks(cdnBase, filename, totalChunks) {
  const chunks = [];
  for (let i = 0; i < totalChunks; i++) {
    const chunkUrl = cdnBase + filename.replace('.data', '.part' + i.toString().padStart(2, '0') + '.bin')
                            .replace('.wasm', '.part' + i.toString().padStart(2, '0') + '.bin');
    const response = await fetch(chunkUrl);
    if (!response.ok) throw new Error('Failed to load chunk ' + i);
    chunks.push(await response.arrayBuffer());
  }
  // Concatenate all chunks
  const totalLength = chunks.reduce((acc, buf) => acc + buf.byteLength, 0);
  const result = new Uint8Array(totalLength);
  let offset = 0;
  for (const buf of chunks) {
    result.set(new Uint8Array(buf), offset);
    offset += buf.byteLength;
  }
  return result.buffer;
}

// Override createUnityInstance to handle chunked data
const originalCreateUnityInstance = window.createUnityInstance;
window.createUnityInstance = async function(canvas, config, progressCallback) {
  // Load chunks if needed
  if (config.dataUrl && config.dataUrl.includes('.part')) {
    const match = config.dataUrl.match(/(.+)\.part(\d+)\.bin/);
    if (match) {
      const baseUrl = match[1];
      const totalChunks = parseInt(match[2]) + 1;
      console.log('Loading data chunks: ' + totalChunks);
      const dataBuffer = await loadChunks(baseUrl + '.', '', totalChunks);
      config.dataUrl = dataBuffer;
    }
  }
  return originalCreateUnityInstance(canvas, config, progressCallback);
};
</script>

</head>

<body>
	<div id="gameContainer">
		<canvas id="unity-canvas" data-pixel-art=""></canvas>
		  <div id="unity-loading-bar">
          <div id="unity-logo"></div>
          <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
          </div>

		<script src="https://cdn.jsdelivr.net/gh/classrom-gg/game-repo-cs-dust@main/cs-dust/Build/CSDust.loader.js"></script>
		<script>
			var loadingBar = document.querySelector("#unity-loading-bar");
			var progressBarFull = document.querySelector("#unity-progress-bar-full");
			var canvas = document.querySelector("#unity-canvas");
			var logo = document.querySelector("#unity-logo");
			var config = {
				dataUrl: "https://cdn.jsdelivr.net/gh/classrom-gg/game-repo-cs-dust@main/cs-dust/Build/webgl.data",
				frameworkUrl: "https://cdn.jsdelivr.net/gh/classrom-gg/game-repo-cs-dust@main/cs-dust/Build/build.framework.js",
				codeUrl: "https://cdn.jsdelivr.net/gh/classrom-gg/game-repo-cs-dust@main/cs-dust/Build/build.wasm",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "SAFING Inc",
				productName: "CS Dust",
				productVersion: "1",
			};
			var scaleToFit;
			try {
				scaleToFit = !!JSON.parse("");
			} catch (e) {
				scaleToFit = true;
			}
			function progressHandler(progress) {
				var percent = progress * 100 + '%';
				progressBarFull.style.width = percent;
			}
			function onResize() {
				var container = canvas.parentElement;
				var w;
				var h;

				if (scaleToFit) {
					w = window.innerWidth;
					h = window.innerHeight;

					var r = 600 / 960;

					if (w * r > window.innerHeight) {
						w = Math.min(w, Math.ceil(h / r));
					}
					h = Math.floor(w * r);
				} else {
					w = 960;
					h = 600;
				}

				container.style.width = canvas.style.width = w + "px";
				container.style.height = canvas.style.height = h + "px";
				container.style.top = Math.floor((window.innerHeight - h) / 2) + "px";
				container.style.left = Math.floor((window.innerWidth - w) / 2) + "px";
				logo.style.left = Math.floor((w - 154) / 2) + "px"; // 154 is the width of the logo
				logo.style.top = Math.floor((h - 130) / 3) + "px";  // 130 is the height of the logo, divided by 3 for 33
			}
			var myGameInstance = null;
			createUnityInstance(canvas, config, progressHandler).then(function (instance) {
				loadingBar.style.display = 'none';
				myGameInstance = instance;
				canvas = instance.Module.canvas;
				onResize();
			});
			window.addEventListener('resize', onResize);
			onResize();

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				// Mobile device style: fill the whole browser client area with the game canvas:
				const meta = document.createElement('meta');
				meta.name = 'viewport';
				meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
				document.getElementsByTagName('head')[0].appendChild(meta);
			}
		</script>
		<script type="text/javascript" src="TemplateData/gameBreakBeta.js"></script>
	</div>
</body>

</html>
